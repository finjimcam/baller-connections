services:
  frontend:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      # Host access for curl/debugging only; the browser goes through the Vite proxy
      - "8080:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - dbdata:/data
    env_file: .env
    environment:
      - DATABASE_PATH=/data/baller.db
      - IMAGE_CACHE_DIR=/data/images
      - TM_API_BASE_URL=http://transfermarkt-api:8000
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      - transfermarkt-api

  transfermarkt-api:
    # Built from a pinned upstream commit (compose bake on Windows can't take a
    # remote git context directly; the v3.0.0 tag ships a broken requirements.txt
    # missing python-dateutil — fixed on main). To (re)build:
    #   docker build https://github.com/felipeall/transfermarkt-api.git#bee4c49628b60f64d99137a675179ff2e6e843b4 -t transfermarkt-api:bee4c49
    image: transfermarkt-api:bee4c49
    restart: unless-stopped
    environment:
      - RATE_LIMITING_ENABLE=false

volumes:
  dbdata:
